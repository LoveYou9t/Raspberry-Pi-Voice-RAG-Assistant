services:
  ollama_server:
    image: ollama/ollama:latest
    container_name: edge_ollama
    restart: always
    expose:
      - "11434"
    volumes:
      - ./ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 90s

  ollama_init:
    image: ollama/ollama:latest
    container_name: edge_ollama_init
    restart: "no"
    depends_on:
      ollama_server:
        condition: service_started
    environment:
      - OLLAMA_HOST=http://ollama_server:11434
      - LLM_MODEL=${LLM_MODEL:-llama3.2:3b}
      - OLLAMA_LOCAL_MODEL_PATH=${OLLAMA_LOCAL_MODEL_PATH:-}
    volumes:
      - ./ollama_data:/root/.ollama
      - ./ollama_models:/models:ro
    command:
      - /bin/sh
      - -c
      - |
        set -u

        if ! command -v ollama >/dev/null 2>&1; then
          echo "Warning: ollama CLI not found in init container."
          exit 0
        fi

        ready=0
        attempt=0
        while [ "$$attempt" -lt 90 ]; do
          if ollama list >/dev/null 2>&1; then
            ready=1
            break
          fi
          attempt=$((attempt + 1))
          echo "Waiting for Ollama service... ($${attempt}/90)"
          sleep 2
        done

        if [ "$$ready" -ne 1 ]; then
          echo "Warning: Ollama service did not become ready in time."
          echo "Continue startup; model pull can be retried manually later."
          exit 0
        fi

        if ollama show "${LLM_MODEL:-llama3.2:3b}" >/dev/null 2>&1; then
          echo "Model already present: ${LLM_MODEL:-llama3.2:3b}"
          exit 0
        fi

        local_model_path="${OLLAMA_LOCAL_MODEL_PATH:-}"
        if [ -n "$$local_model_path" ] && [ -f "$$local_model_path" ]; then
          echo "Found local GGUF model: $$local_model_path"
          tmp_modelfile="/tmp/local-model.Modelfile"
          printf "FROM %s\n" "$$local_model_path" > "$$tmp_modelfile"

          if ollama create "${LLM_MODEL:-llama3.2:3b}" -f "$$tmp_modelfile"; then
            echo "Model created from local GGUF: ${LLM_MODEL:-llama3.2:3b}"
            rm -f "$$tmp_modelfile"
            exit 0
          fi

          echo "Warning: failed to create model from local GGUF, fallback to online pull."
          rm -f "$$tmp_modelfile"
        fi

        for _ in 1 2 3 4 5; do
          if ollama pull "${LLM_MODEL:-llama3.2:3b}"; then
            echo "Model pull completed: ${LLM_MODEL:-llama3.2:3b}"
            exit 0
          fi
          echo "Model pull failed, retrying: ${LLM_MODEL:-llama3.2:3b}"
          sleep 5
        done

        echo "Warning: failed to prewarm ${LLM_MODEL:-llama3.2:3b}."
        echo "Continue startup; run this command later if needed:"
        echo "docker exec edge_ollama ollama pull ${LLM_MODEL:-llama3.2:3b}"
        exit 0

  stt_init:
    image: edge_voice_backend:latest
    container_name: edge_stt_init
    restart: "no"
    env_file:
      - .env
    environment:
      - STT_PROVIDER=${STT_PROVIDER:-whisper_cpp}
      - STT_MODEL=${STT_MODEL:-/app/model_cache/models/faster-whisper-tiny}
      - STT_COMPUTE_TYPE=${STT_COMPUTE_TYPE:-int8}
      - STT_CPP_BIN=${STT_CPP_BIN:-/app/whisper.cpp/whisper-cli}
      - STT_CPP_MODEL_PATH=${STT_CPP_MODEL_PATH:-/app/model_cache/models/ggml-small-q5_0.bin}
      - STT_CPP_QUANT=${STT_CPP_QUANT:-q5_0}
      - STT_CPP_THREADS=${STT_CPP_THREADS:-4}
      - STT_CPP_LANGUAGE=${STT_CPP_LANGUAGE:-zh}
      - STT_CPP_FALLBACK_TO_FASTER=${STT_CPP_FALLBACK_TO_FASTER:-1}
      - STT_PREWARM_STRICT=${STT_PREWARM_STRICT:-0}
      - STT_PREWARM_STATUS_FILE=${STT_PREWARM_STATUS_FILE:-/app/model_cache/stt_prewarm_status.json}
      - HF_HOME=/app/model_cache/hf
      - XDG_CACHE_HOME=/app/model_cache/xdg
    volumes:
      - ./whisper_cache:/app/model_cache
    command:
      - /bin/sh
      - -c
      - |
        python -m app.prewarm_stt

  piper_init:
    image: edge_voice_backend:latest
    container_name: edge_piper_init
    restart: "no"
    env_file:
      - .env
    environment:
      - PIPER_MODEL=${PIPER_MODEL:-/app/piper_cache/zh_CN-huayan-medium.onnx}
      - PIPER_MODEL_URL=${PIPER_MODEL_URL:-https://huggingface.co/rhasspy/piper-voices/resolve/main/zh/zh_CN/huayan/medium/zh_CN-huayan-medium.onnx}
      - PIPER_MODEL_FALLBACK_URLS=${PIPER_MODEL_FALLBACK_URLS:-}
      - PIPER_MODEL_CONFIG_URL=${PIPER_MODEL_CONFIG_URL:-https://huggingface.co/rhasspy/piper-voices/resolve/main/zh/zh_CN/huayan/medium/zh_CN-huayan-medium.onnx.json}
      - PIPER_MODEL_CONFIG_FALLBACK_URLS=${PIPER_MODEL_CONFIG_FALLBACK_URLS:-}
      - PIPER_DOWNLOAD_TRUST_ENV=${PIPER_DOWNLOAD_TRUST_ENV:-1}
      - PIPER_DOWNLOAD_LOCAL_ADDRESS=${PIPER_DOWNLOAD_LOCAL_ADDRESS:-}
      - PIPER_PREWARM_STRICT=${PIPER_PREWARM_STRICT:-0}
      - PIPER_PREWARM_STATUS_FILE=${PIPER_PREWARM_STATUS_FILE:-/app/piper_cache/piper_prewarm_status.json}
    volumes:
      - ./piper_cache:/app/piper_cache
    command:
      - /bin/sh
      - -c
      - |
        python -m app.prewarm_piper

  fastapi_backend:
    image: edge_voice_backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - PYTHON_BASE_IMAGE=${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.11-slim}
        - PIP_INDEX_URL=${PIP_INDEX_URL:-https://pypi.org/simple}
        - PIP_FALLBACK_INDEX_URL=${PIP_FALLBACK_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    container_name: edge_fastapi
    restart: always
    depends_on:
      ollama_server:
        condition: service_started
      ollama_init:
        condition: service_started
      stt_init:
        condition: service_started
      piper_init:
        condition: service_started
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama_server:11434
      - KNOWLEDGE_DIR=/app/knowledge_base
      - LANCEDB_DIR=/app/lancedb_data
      - STT_PROVIDER=${STT_PROVIDER:-whisper_cpp}
      - STT_MODEL=${STT_MODEL:-/app/model_cache/models/faster-whisper-tiny}
      - STT_COMPUTE_TYPE=${STT_COMPUTE_TYPE:-int8}
      - STT_CPP_BIN=${STT_CPP_BIN:-/app/whisper.cpp/whisper-cli}
      - STT_CPP_MODEL_PATH=${STT_CPP_MODEL_PATH:-/app/model_cache/models/ggml-small-q5_0.bin}
      - STT_CPP_QUANT=${STT_CPP_QUANT:-q5_0}
      - STT_CPP_THREADS=${STT_CPP_THREADS:-4}
      - STT_CPP_LANGUAGE=${STT_CPP_LANGUAGE:-zh}
      - STT_CPP_FALLBACK_TO_FASTER=${STT_CPP_FALLBACK_TO_FASTER:-1}
      - STT_PREWARM_STATUS_FILE=${STT_PREWARM_STATUS_FILE:-/app/model_cache/stt_prewarm_status.json}
      - PIPER_PREWARM_STATUS_FILE=${PIPER_PREWARM_STATUS_FILE:-/app/piper_cache/piper_prewarm_status.json}
      - HF_HOME=/app/model_cache/hf
      - XDG_CACHE_HOME=/app/model_cache/xdg
      - UART_ENABLED=${UART_ENABLED:-0}
      - UART_PORT=${UART_PORT:-/dev/ttyAMA0}
      - UART_BAUDRATE=${UART_BAUDRATE:-115200}
      - UART_TIMEOUT_MS=${UART_TIMEOUT_MS:-50}
      - UART_READ_SIZE=${UART_READ_SIZE:-1024}
      - UART_FRAME_PAYLOAD_BYTES=${UART_FRAME_PAYLOAD_BYTES:-240}
      - UART_AUDIO_CODEC=${UART_AUDIO_CODEC:-ulaw8k}
      - UART_DEVICE_SAMPLE_RATE=${UART_DEVICE_SAMPLE_RATE:-8000}
    # Enable these lines on Raspberry Pi to pass the physical UART device through.
    # devices:
    #   - "${UART_PORT_HOST:-/dev/ttyAMA0}:${UART_PORT:-/dev/ttyAMA0}"
    ports:
      - "8000:8000"
    volumes:
      - ./knowledge_base:/app/knowledge_base
      - ./lancedb_data:/app/lancedb_data
      - ./whisper_cache:/app/model_cache
      - ./piper_cache:/app/piper_cache
    deploy:
      resources:
        limits:
          memory: 4096M

  frontend_client:
    image: nginx:alpine
    container_name: edge_frontend
    restart: always
    depends_on:
      - fastapi_backend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
