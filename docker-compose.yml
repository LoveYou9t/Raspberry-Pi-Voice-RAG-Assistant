services:
  ollama_server:
    image: ollama/ollama:latest
    container_name: edge_ollama
    restart: always
    expose:
      - "11434"
    volumes:
      - ./ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 90s

  ollama_init:
    image: ollama/ollama:latest
    container_name: edge_ollama_init
    restart: "no"
    depends_on:
      ollama_server:
        condition: service_started
    environment:
      - OLLAMA_HOST=http://ollama_server:11434
      - LLM_MODEL=${LLM_MODEL:-llama3.2:3b}
    volumes:
      - ./ollama_data:/root/.ollama
    command:
      - /bin/sh
      - -c
      - |
        wait_count=0
        until ollama list >/dev/null 2>&1; do
          wait_count=$((wait_count + 1))
          if [ "$wait_count" -ge 90 ]; then
            echo "Warning: Ollama service did not become ready in time."
            echo "Continue startup; model pull can be retried manually later."
            exit 0
          fi
          echo "Waiting for Ollama service..."
          sleep 2
        done

        if ollama show "${LLM_MODEL}" >/dev/null 2>&1; then
          echo "Model already present: ${LLM_MODEL}"
          exit 0
        fi

        attempt=1
        max_attempts=5
        while [ "$attempt" -le "$max_attempts" ]; do
          if ollama pull "${LLM_MODEL}"; then
            echo "Model pull completed: ${LLM_MODEL}"
            exit 0
          fi
          echo "Model pull failed (attempt ${attempt}/${max_attempts}): ${LLM_MODEL}"
          attempt=$((attempt + 1))
          sleep 5
        done

        echo "Warning: failed to prewarm ${LLM_MODEL}."
        echo "Continue startup; run this command later if needed:"
        echo "docker exec edge_ollama ollama pull ${LLM_MODEL}"
        exit 0

  stt_init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edge_stt_init
    restart: "no"
    env_file:
      - .env
    environment:
      - STT_MODEL=${STT_MODEL:-tiny}
      - HF_HOME=/app/model_cache/hf
      - XDG_CACHE_HOME=/app/model_cache/xdg
    volumes:
      - ./whisper_cache:/app/model_cache
    command: ["python", "-m", "app.prewarm_stt"]

  fastapi_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edge_fastapi
    restart: always
    depends_on:
      ollama_server:
        condition: service_started
      ollama_init:
        condition: service_completed_successfully
      stt_init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama_server:11434
      - KNOWLEDGE_DIR=/app/knowledge_base
      - LANCEDB_DIR=/app/lancedb_data
      - HF_HOME=/app/model_cache/hf
      - XDG_CACHE_HOME=/app/model_cache/xdg
    ports:
      - "8000:8000"
    volumes:
      - ./knowledge_base:/app/knowledge_base
      - ./lancedb_data:/app/lancedb_data
      - ./whisper_cache:/app/model_cache
    deploy:
      resources:
        limits:
          memory: 4096M

  frontend_client:
    image: nginx:alpine
    container_name: edge_frontend
    restart: always
    depends_on:
      - fastapi_backend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
